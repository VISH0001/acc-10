<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Live Bidding Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --dark-bg:#00111a;
  --neon:#00eaff;
  --neon2:#9ffcff;
}

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:radial-gradient(circle,#06273a,#00101a 70%);
  color:white;
  padding-bottom:40px;
}

.top-panel{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  justify-content:center;
  padding:18px;
  align-items:center;
}

.control-box{
  padding:10px 12px;
  border-radius:10px;
  background:rgba(0,20,35,0.6);
}

.control-box label{
  color:var(--neon2);
  font-size:13px;
  display:block;
  margin-bottom:6px;
}

.control-box input{
  width:120px;
  padding:6px;
  border-radius:6px;
  border:none;
  background:#00121c;
  color:var(--neon);
}

.button{
  padding:10px 14px;
  border-radius:8px;
  border:0;
  background:var(--neon);
  color:#00131b;
  font-weight:700;
  cursor:pointer;
}

.display{
  width:92%;
  max-width:360px;
  margin:18px auto;
  border-radius:14px;
  overflow:hidden;
  display:flex;
  align-items:center;
  background:var(--dark-bg);
}

.display .color-strip{
  width:12%;
  min-width:64px;
  height:100%;
}

.display .content{
  padding:18px 22px;
  flex:1;
}

.title-small{
  font-size:14px;
  color:var(--neon2);
  margin-bottom:6px;
}

.big-bid{
  font-size:56px;
  font-weight:800;
}

.team-label{
  font-size:20px;
  margin-top:6px;
}

.team-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
  width:92%;
  max-width:1100px;
  margin:20px auto;
}

.team-cell{
  display:flex;
  border-radius:12px;
  overflow:hidden;
}

.team-cell .strip{
  width:12%;
  min-width:46px;
}

.team-cell .body{
  padding:12px;
  flex:1;
}

.team-cell input{
  border:0;
  background:transparent;
  color:white;
  font-size:18px;
  font-weight:700;
  outline:none;
  width:100%;
}

.team-max{
  margin-top:8px;
  color:rgba(255,255,255,0.9);
  font-size:13px;
  font-weight:700;
}

.rules{
  width:92%;
  max-width:900px;
  margin:16px auto;
  background:#01121a;
  padding:12px;
  border-radius:10px;
}

.rules .row{
  display:flex;
  gap:8px;
  margin-bottom:8px;
}

.rules input{
  padding:8px;
  border-radius:6px;
  border:none;
  background:#00121c;
  color:var(--neon);
  width:100%;
}

@media (max-width:820px){

.team-grid{
  grid-template-columns:repeat(2,1fr);
}

.big-bid{
  font-size:44px;
}

}
</style>
</head>

<body>

<div class="top-panel">

<div class="control-box">
<label>Starting Bid</label>
<input id="startBid" type="number" value="1">
</div>

<button class="button" onclick="undoBid()">Undo</button>
<button class="button" onclick="playerSold()">Player Sold</button>
<button class="button" onclick="resetBid()">Reset</button>
<button class="button" onclick="startAuction()">
Start Auction
</button>

</div>

<div class="display" id="mainDisplay">

<div class="color-strip" id="currentStrip"></div>

<div class="content">

<div class="title-small">CURRENT BID</div>

<div class="big-bid" id="currentBid">1</div>

<div class="team-label" id="currentTeam">---</div>

</div>

</div>

<div class="team-grid" id="teamGrid"></div>

<div class="rules">

<div class="row">
<input value="1 - 19" disabled>
<input value="+1" disabled>
</div>

<div class="row">
<input value="20 - 39" disabled>
<input value="+2" disabled>
</div>

<div class="row">
<input value="40 - 99" disabled>
<input value="+3" disabled>
</div>

<div class="row">
<input value="100 - 500" disabled>
<input value="+5" disabled>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const BID_COOLDOWN = 1500;

const firebaseConfig = {
  apiKey: "AIzaSyCX6FYo5gVgCmds7Xf63xF-Xcg6eIutQmk",
  authDomain: "auction-71c28.firebaseapp.com",
  databaseURL: "https://auction-71c28-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "auction-71c28",
  storageBucket: "auction-71c28.firebasestorage.app",
  messagingSenderId: "92883040612",
  appId: "1:92883040612:web:473f540c99efc20e8d2271"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

const ownerKeys = {
  "t1_Km8Qx2Lp9A":1,
  "t2_Vn4Rb7Ty3M":2,
  "t3_Zp6Hd1Wx8K":3,
  "t4_Qr9Lm5Nc2J":4,
  "t5_Yu3Bx8Pa6T":5,
  "t6_Fk1Vz7Dw4R":6,
  "t7_Hm5Qp2Ls9X":7,
  "t8_Jt8Nc4Vy1B":8,
  "t9_Mx2Rw6Qa7P":9,
  "t10_Pv7Lk3Dz5N":10
};

const defaultTeams = {
 1:"Team 1",
 2:"Team 2",
 3:"Team 3",
 4:"Team 4",
 5:"Team 5",
 6:"Team 6",
 7:"Team 7",
 8:"Team 8",
 9:"Team 9",
 10:"Team 10"
};

const TEAM_COLORS = {
  1:"#1565C0",
  2:"#C62828",
  3:"#2E7D32",
  4:"#6A1B9A",
  5:"#EF6C00",
  6:"#00838F",
  7:"#AD1457",
  8:"#5D4037",
  9:"#283593",
  10:"#9E9D24"
};

const increments = [
  {from:1,to:19,inc:1},
  {from:20,to:39,inc:2},
  {from:40,to:99,inc:3},
  {from:100,to:500,inc:5}
];

db.ref('ownerKeys').once('value').then(snap=>{
  if(!snap.exists()){
    db.ref('ownerKeys').set(ownerKeys);
  }
});

const teamGrid = document.getElementById('teamGrid');

for(let i=1;i<=10;i++){

  const tile = document.createElement('div');

  tile.className = 'team-cell';

  const col = TEAM_COLORS[i];

  tile.style.background = col;

  tile.innerHTML = `
    <div class="strip" style="background:${col}"></div>

    <div class="body">
      <input id="t${i}">
      <div id="t${i}_max" class="team-max">
        Max: —
      </div>
    </div>
  `;

  tile.onclick = ()=>placeBid(i);

  teamGrid.appendChild(tile);

}

/* TEAM LOAD + PERSIST */

db.ref('teams').once('value').then(snap=>{

const data = snap.val();

if(data){

for(let i=1;i<=10;i++){

document.getElementById('t'+i).value =
data[i] || ('Team '+i);

}

}else{

db.ref('teams').set(defaultTeams);

for(let i=1;i<=10;i++){

document.getElementById('t'+i).value =
defaultTeams[i];

}

}

});

/* TEAM SAVE */

for(let i=1;i<=10;i++){

document.addEventListener('input', e=>{

if(e.target.id === 't'+i){

const obj = {};

for(let j=1;j<=10;j++){

obj[j] =
document.getElementById('t'+j).value;

}

db.ref('teams').set(obj);

}

});

}

/* SHEET */

const SHEET_ID =
"1uww5Uq0-kya9gM4pTWFgp79n4lVgeH0Nr6C_v7FOjQ4";

const GVIZ_URL =
`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&range=B27:K27`;

let maxBids = {};

function fetchSheet(){

fetch(GVIZ_URL)
.then(r=>r.text())
.then(txt=>{

const jsonText =
txt.replace(/^[^\(]*\(/,'')
.replace(/\);?$/,'');

const obj = JSON.parse(jsonText);

const rows = obj.table.rows[0].c;

const newMax = {};

for(let i=0;i<10;i++){

const cell = rows[i];

newMax[String(i+1)] =
cell && cell.v ? Number(cell.v) : 0;

}

maxBids = newMax;

db.ref('maxBids').set(maxBids);

});

}

fetchSheet();

setInterval(fetchSheet,10000);

db.ref('maxBids').on('value', snap=>{

maxBids = snap.val() || {};

for(let i=1;i<=10;i++){

document.getElementById(`t${i}_max`).innerText =
'Max: ' + (maxBids[i] || '—');

}

});

/* INCREMENT */

function getIncrementFor(v){

for(let i=0;i<increments.length;i++){

const r = increments[i];

if(v >= r.from && v <= r.to){

return r.inc;

}

}

return 1;

}

/* LAST10 */

function pushToLast10(teamNum, amount, teamName){

db.ref('last10bids').once('value').then(snap=>{

let arr = snap.val() || [];

arr.unshift({
teamNum,
amount,
team:teamName
});

arr = arr.slice(0,10);

db.ref('last10bids').set(arr);

});

}

function removeTopLast10(){

db.ref('last10bids').once('value').then(snap=>{

let arr = snap.val() || [];

arr.shift();

db.ref('last10bids').set(arr);

});

}

/* STATE */

let currentBid = 1;

let history = [];

let lastBidTeam = null;

let saleLocked = false;

let auctionRunning = false;

let cooldownActive = false;

/* START */

function startAuction(){

saleLocked = false;

auctionRunning = true;

}

/* DISPLAY */

function updateDisplay(team){

document.getElementById('currentBid').innerText =
currentBid;

document.getElementById('currentTeam').innerText =
team;

}

function setCurrentStrip(teamNum){

const col =
TEAM_COLORS[teamNum];

document.getElementById('currentStrip').style.background =
col;

document.getElementById('mainDisplay').style.background =
col;

}

function updateOwners(){

db.ref('liveDisplay').set({
currentBid,
currentTeam:
document.getElementById('currentTeam').innerText,
ts:Date.now()
});

}

/* BID */

function placeBid(teamNum){

if(saleLocked) return;

if(cooldownActive) return;

if(!auctionRunning) return;

if(lastBidTeam === teamNum) return;

const teamMax =
Number(maxBids[String(teamNum)] || 0);

const isFirstAccepted =
(history.length === 0);

let nextValue;

if(isFirstAccepted){

nextValue = currentBid;

}else{

nextValue =
currentBid + getIncrementFor(currentBid);

}

if(teamMax > 0 && nextValue > teamMax){

return;

}

const teamName =
document.getElementById('t'+teamNum).value;

history.push({
bid:currentBid,
team:
document.getElementById('currentTeam').innerText
});

if(!isFirstAccepted){

currentBid =
currentBid + getIncrementFor(currentBid);

}

lastBidTeam = teamNum;

updateDisplay(teamName);

setCurrentStrip(teamNum);

updateOwners();

pushToLast10(
teamNum,
currentBid,
teamName
);

cooldownActive = true;

setTimeout(()=>{
cooldownActive = false;
}, BID_COOLDOWN);

}

/* UNDO */

function undoBid(){

saleLocked = false;

auctionRunning = true;

if(history.length === 0) return;

const last = history.pop();

currentBid = last.bid;

lastBidTeam = null;

updateDisplay(last.team);

setCurrentStrip(1);

updateOwners();

removeTopLast10();

}

/* RESET */

function resetBid(){

auctionRunning = false;

saleLocked = false;

currentBid =
parseInt(document.getElementById('startBid').value,10) || 1;

history = [];

lastBidTeam = null;

cooldownActive = false;

updateDisplay('---');

setCurrentStrip(1);

updateOwners();

db.ref('last10bids').set([]);

}

/* SOLD */

function playerSold(){

if(!history.length) return;

saleLocked = true;

auctionRunning = false;

const teamName =
document.getElementById('currentTeam').innerText;

const bid =
Number(document.getElementById('currentBid').innerText);

document.getElementById('currentTeam').innerText =
`SOLD TO: ${teamName}`;

document.getElementById('currentBid').innerText =
bid;

db.ref('liveDisplay').set({
currentBid: bid,
currentTeam:"SOLD",
soldTo:teamName,
ts:Date.now()
});

}

/* KEYBOARD */

document.addEventListener('keydown', e=>{

if(e.key >= '1' && e.key <= '9'){

placeBid(parseInt(e.key,10));

}

if(e.key === '0'){

placeBid(10);

}

});

/* OWNER BIDS */

let lastSeenTime = 0;

db.ref('latestBid').on('value', snap=>{

const data = snap.val();

if(!data) return;

if(!data.time || data.time <= lastSeenTime) return;

lastSeenTime = data.time;

const tnum = Number(data.teamNum);

if(!tnum || tnum < 1 || tnum > 10) return;

placeBid(tnum);

});

window.addEventListener('load', ()=>{

updateDisplay('---');

setCurrentStrip(1);

updateOwners();

});

</script>

</body>
</html>
