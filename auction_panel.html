<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const TEAM_COUNT = 10;
const BID_COOLDOWN = 3000;

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyCX6FYo5gVgCmds7Xf63xF-Xcg6eIutQmk",
  authDomain: "auction-71c28.firebaseapp.com",
  databaseURL: "https://auction-71c28-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "auction-71c28",
  storageBucket: "auction-71c28.firebasestorage.app",
  messagingSenderId: "92883040612",
  appId: "1:92883040612:web:473f540c99efc20e8d2271"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

/* OWNER KEYS */
const ownerKeys = {
  "t1_Km8Qx2Lp9A":1,
  "t2_Vn4Rb7Ty3M":2,
  "t3_Zp6Hd1Wx8K":3,
  "t4_Qr9Lm5Nc2J":4,
  "t5_Yu3Bx8Pa6T":5,
  "t6_Fk1Vz7Dw4R":6,
  "t7_Hm5Qp2Ls9X":7,
  "t8_Jt8Nc4Vy1B":8,
  "t9_Mx2Rw6Qa7P":9,
  "t10_Pv7Lk3Dz5N":10
};

/* TEAM NAMES */
const defaultTeams = {
  1:"Team 1",
  2:"Team 2",
  3:"Team 3",
  4:"Team 4",
  5:"Team 5",
  6:"Team 6",
  7:"Team 7",
  8:"Team 8",
  9:"Team 9",
  10:"Team 10"
};

/* DISTINCT COLORS */
const TEAM_COLORS = {
1:{base:"#1565C0", glow:"rgba(21,101,192,0.35)"},
2:{base:"#C62828", glow:"rgba(198,40,40,0.35)"},
3:{base:"#2E7D32", glow:"rgba(46,125,50,0.35)"},
4:{base:"#6A1B9A", glow:"rgba(106,27,154,0.35)"},
5:{base:"#EF6C00", glow:"rgba(239,108,0,0.35)"},
6:{base:"#00838F", glow:"rgba(0,131,143,0.35)"},
7:{base:"#AD1457", glow:"rgba(173,20,87,0.35)"},
8:{base:"#5D4037", glow:"rgba(93,64,55,0.35)"},
9:{base:"#283593", glow:"rgba(40,53,147,0.35)"},
10:{base:"#9E9D24", glow:"rgba(158,157,36,0.35)"}
};

/* INIT DB */
db.ref('teams').once('value').then(s=>{
  if(!s.exists()) db.ref('teams').set(defaultTeams);
});

db.ref('ownerKeys').once('value').then(s=>{
  if(!s.exists()) db.ref('ownerKeys').set(ownerKeys);
});

/* DEFAULT INCREMENTS */
db.ref('increments').once('value').then(s=>{

if(!s.exists()){

db.ref('increments').set([
{from:1,to:5,inc:1},
{from:6,to:10,inc:2},
{from:11,to:20,inc:5},
{from:21,to:50,inc:10},
{from:51,to:99999,inc:25}
]);

}

});

/* TEAM GRID */
const teamGrid = document.getElementById('teamGrid');

for(let i=1;i<=TEAM_COUNT;i++){

const tile = document.createElement('div');

tile.className = 'team-cell';

tile.style.background = TEAM_COLORS[i].base;

tile.style.boxShadow =
`0 0 18px ${TEAM_COLORS[i].glow}`;

tile.innerHTML = `
<input id="t${i}">
<div class="team-max" id="t${i}_max">Max: —</div>
`;

tile.onclick = ()=> placeBid(i);

teamGrid.appendChild(tile);
}

/* TEAM NAMES SYNC */
db.ref('teams').on('value', snap=>{

const teams = snap.val() || {};

for(let i=1;i<=TEAM_COUNT;i++){

document.getElementById('t'+i).value =
teams[i] || ('Team '+i);

}
});

/* SAVE TEAM NAMES */
teamGrid.addEventListener('input', ()=>{

const obj = {};

for(let i=1;i<=TEAM_COUNT;i++){

obj[i] =
document.getElementById('t'+i).value;

}

db.ref('teams').set(obj);

});

/* GOOGLE SHEET */
const SHEET_ID =
"1uww5Uq0-kya9gM4pTWFgp79n4lVgeH0Nr6C_v7FOjQ4";

const GVIZ_URL =
`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&range=B27:K27`;

let maxBids = {};

function fetchSheet(){

fetch(GVIZ_URL)
.then(r=>r.text())
.then(txt=>{

const jsonText =
txt.replace(/^[^\(]*\(/,'')
.replace(/\);?$/,'');

const obj = JSON.parse(jsonText);

const rows = obj.table.rows[0].c;

const newMax = {};

for(let i=0;i<TEAM_COUNT;i++){

const cell = rows[i];

newMax[String(i+1)] =
(cell && cell.v)
? Number(cell.v)
: 0;
}

maxBids = newMax;

db.ref('maxBids').set(maxBids);

})
.catch(err=>console.log(err));
}

fetchSheet();

setInterval(fetchSheet,10000);

/* MAX BID DISPLAY */
db.ref('maxBids').on('value', snap=>{

maxBids = snap.val() || {};

for(let i=1;i<=TEAM_COUNT;i++){

document.getElementById(`t${i}_max`).innerText =
'Max: ' + (maxBids[i] || '—');

}

});

/* INCREMENT RULES */
let increments = [];

db.ref('increments').on('value', snap=>{

increments = snap.val() || [];

for(let i=0;i<5;i++){

const r = increments[i] || {};

document.getElementById(`r${i+1}_from`).value =
r.from ?? "";

document.getElementById(`r${i+1}_to`).value =
r.to ?? "";

document.getElementById(`r${i+1}_inc`).value =
r.inc ?? "";

}

});

/* SAVE RULES */
function saveRules(){

const arr = [];

for(let i=1;i<=5;i++){

arr.push({
from:Number(document.getElementById(`r${i}_from`).value),
to:Number(document.getElementById(`r${i}_to`).value),
inc:Number(document.getElementById(`r${i}_inc`).value)
});

}

db.ref('increments').set(arr);

alert("Rules Saved");

}

/* INCREMENT LOGIC */
function getIncrementFor(bid){

for(let i=0;i<increments.length;i++){

const r = increments[i];

const from = Number(r.from);
const to = Number(r.to);

if(bid >= from && bid <= to){

return Number(r.inc);

}
}

return Number(document.getElementById('fallbackInc').value) || 10;

}

/* STATE */
let currentBid =
Number(document.getElementById('startBid').value);

let history = [];

let lastBidTeam = null;

let saleLocked = false;

let auctionRunning = false;

let cooldownActive = false;

/* DISPLAY */
function setCurrentStrip(teamNum){

const col = TEAM_COLORS[teamNum].base;

document.getElementById('currentStrip').style.background = col;

document.getElementById('mainDisplay').style.background = col;

}

function updateDisplay(team){

document.getElementById('currentBid').innerText =
currentBid;

document.getElementById('currentTeam').innerText =
team;

}

/* OWNER SYNC */
function updateOwners(){

db.ref('liveDisplay').set({
currentBid,
currentTeam:
document.getElementById('currentTeam').innerText,
ts:Date.now()
});

}

/* LAST10 */
function pushToLast10(teamNum, amount, teamName){

db.ref('last10bids').once('value').then(s=>{

let arr = s.val() || [];

arr.unshift({
teamNum,
team:teamName,
amount
});

arr = arr.slice(0,10);

db.ref('last10bids').set(arr);

});

}

/* COOLDOWN */
function startCooldown(){

cooldownActive = true;

setTimeout(()=>{
cooldownActive = false;
}, BID_COOLDOWN);

}

/* PLACE BID */
function placeBid(teamNum){

if(saleLocked) return;

if(!auctionRunning) return;

if(cooldownActive) return;

if(lastBidTeam === teamNum) return;

const teamMax =
Number(maxBids[String(teamNum)] || 0);

const isFirstBid =
history.length === 0;

let nextValue = currentBid;

if(!isFirstBid){

nextValue =
currentBid + getIncrementFor(currentBid);

}

if(teamMax > 0 && nextValue > teamMax){

document.getElementById('rejectionNote').innerText =
`Bid rejected — max ${teamMax}`;

setTimeout(()=>{
document.getElementById('rejectionNote').innerText='';
},3000);

return;
}

const teamName =
document.getElementById('t'+teamNum).value;

history.push({
bid:currentBid,
team:document.getElementById('currentTeam').innerText
});

if(!isFirstBid){

currentBid =
currentBid + getIncrementFor(currentBid);

}

lastBidTeam = teamNum;

updateDisplay(teamName);

setCurrentStrip(teamNum);

updateOwners();

pushToLast10(teamNum,currentBid,teamName);

startCooldown();

}

/* UNDO */
function undoBid(){

if(history.length === 0) return;

const last = history.pop();

currentBid = last.bid;

updateDisplay(last.team);

updateOwners();

}

/* SOLD */
function playerSold(){

saleLocked = true;

auctionRunning = false;

const teamName =
document.getElementById('currentTeam').innerText;

db.ref('liveDisplay').set({
currentBid,
currentTeam:"SOLD",
soldTo:teamName,
ts:Date.now()
});

document.getElementById('currentTeam').innerText =
"SOLD TO: " + teamName;

}

/* RESET */
function resetBid(){

auctionRunning = false;

saleLocked = false;

history = [];

currentBid =
Number(document.getElementById('startBid').value);

updateDisplay('---');

updateOwners();

db.ref('last10bids').set([]);

}

/* START */
function startAuction(){

saleLocked = false;

auctionRunning = true;

}

/* KEYBOARD */
document.addEventListener('keydown', e=>{

if(e.key >= '1' && e.key <= '9'){

placeBid(Number(e.key));

}

if(e.key === '0'){

placeBid(10);

}

});

/* OWNER BIDS */
let lastSeen = 0;

db.ref('latestBid').on('value', snap=>{

const d = snap.val();

if(!d) return;

if(d.time <= lastSeen) return;

lastSeen = d.time;

placeBid(Number(d.teamNum));

});

/* INIT */
updateDisplay('---');

setCurrentStrip(1);

updateOwners();

</script>
